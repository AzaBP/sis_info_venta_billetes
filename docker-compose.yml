services:
  # Base de datos Relacional (PostgreSQL)
  postgres:
    image: postgres:15
    container_name: trenes_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sis_info_venta_billetes_bd
    ports:
      - "5432:5432"
    volumes:
      - ./datos_postgres:/var/lib/postgresql/data
      - ./baseDatos:/docker-entrypoint-initdb.d

  # Base de datos Documental (MongoDB)
  mongo:
    image: mongo:4.4
    container_name: trenes_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - ./datos_mongo:/data/db
      - ./baseDatos/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  # Gestor visual (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: trenes_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trenes.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres

# Gestor visual (Mongo Express para MongoDB)
  mongo-express:
    image: mongo-express
    container_name: trenes_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_SERVER: trenes_mongo
    depends_on:
      - mongo

  # Servidor Web (Apache + PHP)
  web:
    build: .
    container_name: trenes_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - postgres
      - mongo
    volumes:
      - ./:/var/www/html/   # <--- Fíjate en el guion, esto es el "array" que pedía

volumes:
  datos_postgres:
  datos_mongo:
